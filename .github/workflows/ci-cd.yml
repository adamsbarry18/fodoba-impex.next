# .github/workflows/ci-cd.yml
# Secrets GitHub du dépôt (Réglages → Secrets) :
#   VERCEL_TOKEN      - https://vercel.com/account/tokens
#   VERCEL_ORG_ID     - .vercel/project.json ou paramètres équipe
#   VERCEL_PROJECT_ID - id du projet Vercel
#
# Variables Firebase : dans Vercel (Settings → Environment Variables),
# reproduire les clés NEXT_PUBLIC_FIREBASE_* de .env.local
name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
